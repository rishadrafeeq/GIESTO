<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIESTO | Shop All</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body data-page="collection">

    <div data-include="partials/header.html"></div>

    <main>
        <section class="page-hero">
            <div class="container">
                <h1>Shop All Products</h1>
                <p>Select a product, choose your size, order on WhatsApp</p>
            </div>
        </section>

        <section class="section shop-section">
            <div class="container">
                <div class="shop-tabs">
                    <button type="button" class="shop-tab active" data-filter="all">All</button>
                    <button type="button" class="shop-tab" data-filter="formal">Formal Wear</button>
                    <button type="button" class="shop-tab" data-filter="casual">Casual Wear</button>
                    <button type="button" class="shop-tab" data-filter="sports">Sports Wear</button>
                </div>

                <div class="filter-group shop-filters">
                    <button class="filter-btn active" data-filter="all" type="button">All</button>
                    <button class="filter-btn" data-filter="formal" type="button">Formal</button>
                    <button class="filter-btn" data-filter="casual" type="button">Casual</button>
                    <button class="filter-btn" data-filter="sports" type="button">Sportswear</button>
                </div>

                <div class="product-grid" id="shop-grid"></div>
                <p class="shop-empty" id="collection-empty" hidden>No products in this category.</p>
            </div>
        </section>
    </main>

    <div data-include="partials/footer.html"></div>
    <div data-include="partials/modal.html"></div>
    <script src="../data/site-config.js"></script>
    <script src="../js/products-store.js"></script>
    <script src="includes.js"></script>
</body>
</html>
